name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t glyphhold:ci .

      - name: Smoke import and migrations
        run: |
          docker run --rm \
            -e GLYPHHOLD_DB_PATH=/tmp/glyphhold-ci.sqlite \
            glyphhold:ci \
            python -c "from app.storage.migrations import apply_migrations,current_schema_version; apply_migrations(); assert current_schema_version() >= 3"
