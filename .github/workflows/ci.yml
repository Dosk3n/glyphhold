name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: python-checks
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t glyphhold:ci .

      - name: Smoke import and migrations
        run: |
          docker run --rm \
            -e GLYPHHOLD_DB_PATH=/tmp/glyphhold-ci.sqlite \
            glyphhold:ci \
            python -c "from app.storage.migrations import apply_migrations,current_schema_version; apply_migrations(); assert current_schema_version() >= 4"
