services:
  glyphhold:
    image: ghcr.io/dosk3n/glyphhold:0.1.0-beta
    container_name: glyphhold
    ports:
      - "5995:5995"
    volumes:
      - ./data:/data
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5995/api/v1/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
