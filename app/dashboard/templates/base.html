<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Tomewarden{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/dashboard">Tomewarden</a>
      {% if user %}
      <nav>
        <a href="/dashboard">Status</a>
        <a href="/dashboard/api-keys">API Keys</a>
      </nav>
      <form method="post" action="/logout">
        <button type="submit">Log out</button>
      </form>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
